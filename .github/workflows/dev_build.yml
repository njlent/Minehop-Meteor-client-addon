name: Publish Development Build

on: push

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build with Gradle
        run: ./gradlew build

      - name: Move snapshot tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa snapshot "${GITHUB_SHA}" -m "Dev build for ${GITHUB_SHA}"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" refs/tags/snapshot

      - name: Build release notes
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          notes_file="${RUNNER_TEMP}/dev-build-notes.md"
          last_release_tag="$(
            gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=20" \
              --jq '[.[] | select(.draft == false and .prerelease == false)][0].tag_name // ""'
          )"
          short_sha="$(git rev-parse --short HEAD)"
          branch_name="${GITHUB_REF_NAME}"

          {
            echo "Automated dev build for \`${short_sha}\` on \`${branch_name}\`."
            echo

            if [ -n "${last_release_tag}" ] && git rev-parse -q --verify "refs/tags/${last_release_tag}" >/dev/null; then
              commit_count="$(git rev-list --count "${last_release_tag}..HEAD")"
              echo "Includes ${commit_count} commit(s) since \`${last_release_tag}\`."
              echo
              echo "[Full compare](https://github.com/${GITHUB_REPOSITORY}/compare/${last_release_tag}...${GITHUB_SHA})"
              echo

              if [ "${commit_count}" -gt 0 ]; then
                git log --reverse --pretty='- `%h` %s' "${last_release_tag}..HEAD"
              else
                echo "- No commits since the latest release."
              fi
            else
              echo "No stable GitHub release found yet."
              echo
              echo "Recent commits in this build:"
              echo
              git log --reverse --max-count 20 --pretty='- `%h` %s'
            fi
          } > "${notes_file}"

          echo "path=${notes_file}" >> "${GITHUB_OUTPUT}"

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: snapshot
          name: Dev Build
          body_path: ${{ steps.notes.outputs.path }}
          prerelease: true
          files: |
            ./builds/libs/*.jar
